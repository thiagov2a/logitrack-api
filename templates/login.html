<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrack — Iniciar sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <p class="text-4xl mb-2">📦</p>
            <h1 class="text-2xl font-bold text-gray-800">LogiTrack</h1>
            <p class="text-sm text-gray-400 mt-1">Sistema Federal de Gestión de Logística</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
            <h2 class="text-lg font-semibold text-gray-700 mb-6">Iniciar sesión</h2>

            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-5 text-sm flex items-center gap-2">
                ⚠️ {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" id="input-email" required placeholder="Ej: operador@logitrack.com"
                        class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" name="password" id="input-password" required placeholder="••••••••"
                        class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-gray-50">
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition text-sm">
                    Iniciar sesión →
                </button>
            </form>

            <div class="mt-6 border-t border-gray-100 pt-4">
                <p class="text-xs text-gray-400 text-center mb-3">Acceso rápido con usuario de prueba:</p>
                <div class="flex gap-2 justify-center">
                    <button type="button" onclick="autocompletar('operador@logitrack.com', 'operador123')"
                        class="flex-1 text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-2 rounded-lg transition font-medium">
                        👤 Operador
                    </button>
                    <button type="button" onclick="autocompletar('supervisor@logitrack.com', 'supervisor123')"
                        class="flex-1 text-xs bg-blue-50 hover:bg-blue-100 text-blue-700 px-3 py-2 rounded-lg transition font-medium">
                        🔑 Supervisor
                    </button>
                    <button type="button" onclick="autocompletar('admin@logitrack.com', 'admin123')"
                        class="flex-1 text-xs bg-purple-50 hover:bg-purple-100 text-purple-700 px-3 py-2 rounded-lg transition font-medium">
                        ⚙️ Admin
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function autocompletar(email, password) {
            document.getElementById('input-email').value = email;
            document.getElementById('input-password').value = password;
        }
    </script>

</body>
</html>
