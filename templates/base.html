<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrack — {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <nav class="bg-blue-700 text-white px-6 py-3 flex items-center justify-between shadow-md">
        <a href="/" class="flex items-center gap-2 text-xl font-bold tracking-wide hover:opacity-90">
            📦 <span>LogiTrack</span>
        </a>
        <div class="flex items-center gap-3 text-sm">
            <a href="/envios/nuevo"
               class="bg-white text-blue-700 font-semibold px-3 py-1.5 rounded-lg hover:bg-blue-50 transition">
                + Nuevo envío
            </a>
            {% if usuario %}
            <div class="flex items-center gap-2 bg-blue-800 rounded-lg px-3 py-1.5">
                <span class="text-blue-200 text-xs">
                    {% if usuario.rol == 'operador' %}👤
                    {% elif usuario.rol == 'supervisor' %}🔑
                    {% else %}⚙️
                    {% endif %}
                </span>
                <span class="text-white text-xs font-medium">{{ usuario.nombre }}</span>
                <span class="text-blue-300 text-xs">({{ usuario.rol }})</span>
            </div>
            <a href="/logout" class="text-xs text-blue-200 hover:text-white transition">Cerrar sesión</a>
            {% endif %}
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8 w-full flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-xs text-gray-400 py-4 border-t border-gray-200">
        LogiTrack — SFGLD · Grupo 10 · UNGS 2026
    </footer>

</body>
</html>
