<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrack — {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <nav class="bg-blue-700 text-white px-6 py-3 flex items-center justify-between shadow-md">
        <a href="/?rol={{ rol or 'operador' }}" class="flex items-center gap-2 text-xl font-bold tracking-wide hover:opacity-90">
            📦 <span>LogiTrack</span>
        </a>
        <div class="flex items-center gap-3 text-sm">
            <a href="/envios/nuevo?rol={{ rol or 'operador' }}"
               class="bg-white text-blue-700 font-semibold px-3 py-1.5 rounded-lg hover:bg-blue-50 transition">
                + Nuevo envío
            </a>
            <div class="flex items-center gap-1 bg-blue-800 rounded-lg px-3 py-1.5">
                <span class="text-blue-300 text-xs mr-1">Rol:</span>
                <a href="?rol=operador"
                   class="text-xs px-2.5 py-1 rounded-md transition
                   {% if rol == 'operador' or not rol %}bg-white text-blue-700 font-semibold shadow-sm{% else %}text-blue-200 hover:bg-blue-700{% endif %}">
                    👤 Operador
                </a>
                <a href="?rol=supervisor"
                   class="text-xs px-2.5 py-1 rounded-md transition
                   {% if rol == 'supervisor' %}bg-white text-blue-700 font-semibold shadow-sm{% else %}text-blue-200 hover:bg-blue-700{% endif %}">
                    🔑 Supervisor
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8 w-full flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-xs text-gray-400 py-4 border-t border-gray-200">
        LogiTrack — SFGLD · Grupo 10 · UNGS 2026
    </footer>

</body>
</html>
