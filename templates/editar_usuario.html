{% extends "base.html" %}
{% block title %}Editar Usuario{% endblock %}

{% block content %}

<div class="mb-6">
    <a href="/usuarios/" class="inline-flex items-center gap-1.5 text-sm text-gray-600 bg-white border border-gray-200 hover:bg-gray-50 px-3 py-1.5 rounded-lg transition">
        ← Volver al listado
    </a>
</div>

<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
        <h1 class="text-xl font-bold text-gray-800 mb-1">Editar usuario</h1>
        <p class="text-sm text-gray-400 mb-6 font-mono">{{ target.email }}</p>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-5 text-sm flex items-center gap-2">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/usuarios/{{ target.email }}/editar" class="space-y-4">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre <span class="text-red-400">*</span></label>
                <input type="text" name="nombre" required minlength="2"
                    value="{{ target.nombre }}"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-gray-50">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="text" value="{{ target.email }}" disabled
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-gray-100 text-gray-400 cursor-not-allowed">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Rol <span class="text-red-400">*</span></label>
                <select name="rol_nuevo" required
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-gray-50">
                    <option value="operador" {% if target.rol == "operador" %}selected{% endif %}>👤 Operador</option>
                    <option value="supervisor" {% if target.rol == "supervisor" %}selected{% endif %}>🔑 Supervisor</option>
                    <option value="administrador" {% if target.rol == "administrador" %}selected{% endif %}>⚙️ Administrador</option>
                </select>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition text-sm">
                Guardar cambios →
            </button>
        </form>
    </div>
</div>
{% endblock %}
